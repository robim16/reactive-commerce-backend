spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://rcadmin:rcpassword@localhost:27017/notification_db?authSource=admin}
  webflux:
    base-path: /
server:
  port: 8087
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
aws:
  ses:
    from-address: ${AWS_SES_FROM:noreply@reactivecommerce.com}
    region: ${AWS_REGION:us-east-1}
  sqs:
    queue-url: ${AWS_SQS_QUEUE_URL:https://sqs.us-east-1.amazonaws.com/000000000000/notifications}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
