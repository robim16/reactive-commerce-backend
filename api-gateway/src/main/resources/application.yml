spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:

        # ── Auth Service — rutas públicas con rate limiting ──────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        # ── Product Service — rutas PÚBLICAS (GET catálogo y detalle) ────────
        # GET /api/v1/assets y GET /api/v1/assets/{id} no requieren token.
        # Si el token está presente se extrae el contexto de usuario (opcional).
        - id: product-service-public
          uri: lb://product-service
          predicates:
            - Path=/api/v1/assets/**
            - Method=GET
          filters:
            - name: JwtAuthFilter
              args:
                required: false   # token opcional — anónimos pueden ver el catálogo

        # ── Product Service — rutas PRIVADAS (escritura: crear, moderar) ─────
        - id: product-service-private
          uri: lb://product-service
          predicates:
            - Path=/api/v1/assets/**
            - Method=POST,PUT,PATCH,DELETE
          filters:
            - name: JwtAuthFilter
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,CREATOR,MODERATOR

        # ── Order Service ────────────────────────────────────────────────────
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: JwtAuthFilter
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,BUYER,CREATOR

        # ── Payment Service ──────────────────────────────────────────────────
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: JwtAuthFilter

        # ── Download Service ─────────────────────────────────────────────────
        - id: download-service
          uri: lb://download-service
          predicates:
            - Path=/api/v1/downloads/**
          filters:
            - name: JwtAuthFilter

        # ── Review Service — GET público, POST/PUT privado ───────────────────
        - id: review-service-public
          uri: lb://review-service
          predicates:
            - Path=/api/v1/reviews/**
            - Method=GET
          filters:
            - name: JwtAuthFilter
              args:
                required: false

        - id: review-service-private
          uri: lb://review-service
          predicates:
            - Path=/api/v1/reviews/**
            - Method=POST,PUT,DELETE
          filters:
            - name: JwtAuthFilter
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,BUYER,MODERATOR

        # ── Notification Service ─────────────────────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: JwtAuthFilter

        # ── Report Service ───────────────────────────────────────────────────
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/v1/reports/**
          filters:
            - name: JwtAuthFilter

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:rcredis}

server:
  port: 8089

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:reactive-commerce-secret-key-at-least-256-bits-long-for-security}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
