spring:
  application:
    name: auth-service
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/reactive_commerce}
    username: ${SPRING_R2DBC_USERNAME:rcadmin}
    password: ${SPRING_R2DBC_PASSWORD:rcpassword}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:rcredis}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/reactive_commerce
    user: ${SPRING_R2DBC_USERNAME:rcadmin}
    password: ${SPRING_R2DBC_PASSWORD:rcpassword}

server:
  port: 8081

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

jwt:
  secret: ${JWT_SECRET:reactive-commerce-secret-key-at-least-256-bits-long-for-security}
  access-token-ttl-ms: 900000    # 15 min
  refresh-token-ttl-ms: 604800000 # 7 días

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"auth-service","traceId":"%X{traceId}","spanId":"%X{spanId}","message":"%m"}%n'
